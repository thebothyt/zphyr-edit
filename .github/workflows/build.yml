name: Build Geode Mod

on:
  repository_dispatch:
    types: [trigger-build] # This allows your website to trigger the build via API

jobs:
  build:
    strategy:
      matrix:
        config:
          - name: Android32
            target: Android32
          - name: Android64
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build the mod
      uses: geode-sdk/build-geode-mod@main
      with:
        target: ${{ matrix.config.target }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: geode-mod-${{ matrix.config.target }}
        path: build/*.geode
