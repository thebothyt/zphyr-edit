name: zyphr edit

on:
  repository_dispatch:
    types: [trigger-build]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false # This keeps the build going even if one part fails
      matrix:
        config:
          - name: Android64
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Complete GeoFlow Transpiler
      run: |
        cat << 'EOF' > transpile.py
        import re
        import os

        ID_MAP = {
            "'spike'": "8",
            "'block'": "1",
            "'3d_block'": "2",
            "'move_trigger'": "901"
        }

        if not os.path.exists("mod.txt"):
            with open("mod.txt", "w") as f:
                f.write("print(\"No mod.txt found!\")")

        with open("mod.txt", "r") as f:
            lines = f.readlines()

        cpp_lines = []
        for line in lines:
            clean_line = line.strip()
            if not clean_line or clean_line.startswith("#"):
                continue

            # Handle Object() calls
            if "Object(" in clean_line:
                args_match = re.search(r'Object\((.*)\)', clean_line)
                if args_match:
                    args_str = args_match.group(1)
                    obj_id, x_val, y_val, scale_val = "1", "0", "0", "1.0f"
                    
                    for arg in args_str.split(','):
                        if '=' in arg:
                            k, v = arg.split('=')[0].strip(), arg.split('=')[1].strip()
                            if k == "id": obj_id = ID_MAP.get(v, "1")
                            elif k == "x": x_val = v
                            elif k == "y": y_val = v
                            elif k == "scale": scale_val = f"{v}f"

                    cpp_lines.append(f"if (auto layer = LevelEditorLayer::get()) {{")
                    cpp_lines.append(f"    auto obj = layer->createObject({obj_id}, {{ float({x_val}), float({y_val}) }}, true);")
                    cpp_lines.append(f"    if(obj) obj->setScale({scale_val});")
                    cpp_lines.append(f"}}")

            # Handle scanLevel()
            elif "scanLevel()" in clean_line:
                cpp_lines.append("if (auto layer = LevelEditorLayer::get()) {")
                cpp_lines.append("    int total = layer->m_objects->count();")
                cpp_lines.append("    FLAlertLayer::create(\"Scan\", (\"Objects: \" + std::to_string(total)).c_str(), \"OK\")->show();")
                cpp_lines.append("}")

            # Handle print()
            elif "print(" in clean_line:
                match = re.search(r'print\((.*)\)', clean_line)
                if match:
                    cpp_lines.append(f'FLAlertLayer::create("GeoFlow", {match.group(1)}, "OK")->show();')

        body_code = "\n        ".join(cpp_lines)

        cpp_template = f"""#include <Geode/Geode.hpp>
        #include <Geode/modify/EditorUI.hpp>
        #include <Geode/modify/LevelEditorLayer.hpp>
        using namespace geode::prelude;

        class $modify(MyEditorUI, EditorUI) {{
            bool init(LevelEditorLayer* editor) {{
                if (!EditorUI::init(editor)) return false;
                auto menu = this->getChildByID("edit-menu");
                if (menu) {{
                    auto btnSprite = ButtonSprite::create("RUN");
                    auto btn = CCMenuItemSpriteExtra::create(btnSprite, this, menu_selector(MyEditorUI::onRunGeoFlow));
                    menu->addChild(btn);
                    menu->updateLayout();
                }}
                return true;
            }}
            void onRunGeoFlow(CCObject*) {{
                {body_code}
            }}
        }};
        """
        os.makedirs("src", exist_ok=True)
        with open("src/main.cpp", "w") as f:
            f.write(cpp_template)
        EOF
        python3 transpile.py

    - name: Build the mod
      uses: geode-sdk/build-geode-mod@main
      with:
        target: ${{ matrix.config.target }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: geode-mod-${{ matrix.config.target }}
        path: build/*.geode
